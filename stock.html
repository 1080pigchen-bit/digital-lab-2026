<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chong Family Terminal v2.9 | Debugged Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e4e4e7; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { background: #09090b; border-right: 1px solid #18181b; }
        .stock-item { transition: 0.2s; border: 1px solid transparent; }
        .stock-item.active { background: #10b98115; border-color: #10b98150; }
        .nav-tab { cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-tab.active { border-bottom-color: #10b981; color: #10b981; }
        .score-bar { height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; width: 35px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <div class="h-10 border-b border-zinc-800 bg-black overflow-hidden" id="tv-ticker-widget"></div>

    <div class="flex flex-1 overflow-hidden">
        <aside class="sidebar w-80 flex flex-col h-full shadow-2xl">
            <div class="p-6 border-b border-zinc-800">
                <a href="index.html" class="text-[10px] text-zinc-500 font-bold tracking-widest mb-4 block hover:text-emerald-500 transition-colors">← BACK TO LAB</a>
                <h1 class="text-xl font-black text-emerald-500 tracking-tighter uppercase leading-none">宜辰家庭<br>終端 V2.9</h1>
                <div class="flex gap-4 mt-6">
                    <div id="tab-stocks" class="nav-tab active text-[10px] font-bold uppercase tracking-widest pb-1" onclick="switchPage('stocks')">Market Terminal</div>
                    <div id="tab-youtube" class="nav-tab text-[10px] font-bold uppercase tracking-widest pb-1" onclick="switchPage('youtube')">Daily Intelligence</div>
                </div>
            </div>

            <div id="stock-list-container" class="flex-1 overflow-y-auto p-2">
                <div id="category-list" class="space-y-6">
                    <div class="p-6 text-zinc-600 text-[10px] uppercase tracking-widest italic animate-pulse">Initializing Data Stream...</div>
                </div>
            </div>
            
            <div id="video-info-container" class="hidden p-6 text-[10px] text-zinc-500 italic">Streaming: 游庭皓的財經皓角</div>
        </aside>

        <main class="flex-1 flex flex-col bg-black overflow-hidden relative">
            
            <div id="page-stocks" class="flex-1 flex flex-col overflow-y-auto">
                <div class="w-full h-[450px] p-4">
                    <div id="tv-overview-widget" class="w-full h-full rounded-xl overflow-hidden border border-zinc-800 bg-zinc-950"></div>
                </div>
                <div class="px-6 py-2 grid grid-cols-1 md:grid-cols-3 gap-3" id="news-feed"></div>
            </div>

            <div id="page-youtube" class="hidden flex-1 flex flex-col p-8 overflow-y-auto">
                <h2 class="text-3xl font-black text-white mb-6 tracking-tighter">DAILY VIDEO BRIEFING</h2>
                <div id="yt-player-container" class="aspect-video w-full max-w-4xl rounded-2xl overflow-hidden border border-zinc-800 bg-zinc-900 mb-8 shadow-2xl"></div>
                <div id="yt-list" class="grid grid-cols-1 md:grid-cols-3 gap-4 text-[10px] uppercase font-bold text-zinc-500"></div>
            </div>

            <div class="p-8 border-t border-zinc-900 bg-zinc-950/80 backdrop-blur-md">
                <div class="flex items-center gap-3 mb-2">
                    <span class="px-2 py-0.5 bg-emerald-500 text-black text-[9px] font-black rounded uppercase tracking-tighter">Family Guide</span>
                    <h2 class="text-xl font-black text-white uppercase tracking-tight" id="desc-name">Market Monitor</h2>
                    <span id="desc-emoji" class="text-2xl">📡</span>
                </div>
                <p class="text-zinc-400 text-xs leading-relaxed max-w-3xl" id="desc-content">請點擊左側標的查看白話文產業分析與評分等級。</p>
            </div>
        </main>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 【重要】請務必在此貼入 Google Sheets 的 CSV 發佈連結
        // 連結格式應為：https://docs.google.com/spreadsheets/d/.../pub?output=csv
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-0898ngmOYQTTIgoXmw7pk6z1jucOzNpT2N4jiO0FXh6SXIGyNTAc8iCG1Q3St0oCbsvkTXWxtU2R/pub?output=csv"; 
        
        const YT_CHANNEL_ID = "UC0lbAQVpenvfA2QqzsRtL_g";
        const LIFE_DESC = { 
            "NVDA": "AI 時代的腦袋製造商。負責所有科技產品的思考運算。", 
            "TSM": "全球最強的晶片工廠（台積電）。掌握全人類科技進步的鑰匙。", 
            "AAPL": "蘋果公司。強大的產品生態系，讓用戶黏著度極高。", 
            "COST": "好市多。靠高品質與會員制建立的穩定零售霸主。", 
            "MP": "稀土資源龍頭。生產電動車與高端手機必備的關鍵礦產。",
            "SPOT": "全球音樂串流領導者。數據分析能力讓聽眾高度依賴。"
        };

        let currentSymbol = "NVDA";

        function getGrade(score) {
            if (score >= 81) return "🥳";
            if (score >= 61) return "😍";
            if (score >= 41) return "🙂";
            if (score >= 21) return "😐";
            return "🥶";
        }

        async function syncData() {
            const container = document.getElementById('category-list');
            try {
                const res = await fetch(SHEET_CSV_URL);
                const csvText = await res.text();
                const lines = csvText.split(/\r?\n/);
                const header = lines[0].split(',');
                
                // 動態尋找欄位索引
                const idxTicker = header.findIndex(h => h.trim() === 'Ticker');
                const idxScore = header.findIndex(h => h.trim() === 'YiChenScore');
                const idxCat = header.findIndex(h => h.trim() === 'Category');

                if (idxTicker === -1 || idxScore === -1 || idxCat === -1) {
                    throw new Error("CSV 欄位名稱不符。請檢查首列是否有 Ticker, YiChenScore, Category");
                }

                const rows = lines.slice(1);
                const dataByCat = {};

                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length < header.length) return;
                    
                    const fullTicker = cols[idxTicker].trim();
                    const sym = fullTicker.split(':')[1] || fullTicker;
                    const score = parseFloat(cols[idxScore]) || 0;
                    const cat = cols[idxCat].trim();

                    if (!dataByCat[cat]) dataByCat[cat] = [];
                    dataByCat[cat].push({ sym, score, fullTicker, grade: getGrade(score) });
                });

                renderList(dataByCat);
            } catch (e) {
                console.error(e);
                container.innerHTML = `<div class="p-6 text-red-500 text-[11px] leading-relaxed">
                    <p class="font-black mb-2">數據同步失敗 ⚠️</p>
                    <p>1. 請檢查 Google Sheet 是否設為「發佈到網路」並選擇「CSV」格式。</p>
                    <p>2. 確認首列標題為：Ticker, YiChenScore, Category</p>
                </div>`;
            }
        }

        function renderList(dataByCat) {
            const container = document.getElementById('category-list');
            container.innerHTML = '';
            
            for (let cat in dataByCat) {
                const sorted = dataByCat[cat].sort((a,b) => b.score - a.score);
                let section = document.createElement('div');
                section.innerHTML = `<div class="px-4 py-2 text-[9px] font-black text-zinc-600 bg-zinc-900/40 border-y border-zinc-800/50 uppercase tracking-widest mb-2">${cat}</div>`;
                
                let grid = document.createElement('div');
                grid.className = "space-y-1";
                sorted.forEach(item => {
                    let btn = document.createElement('div');
                    btn.className = `stock-item px-4 py-3 rounded-lg flex justify-between items-center cursor-pointer ${item.sym === currentSymbol ? 'active' : ''}`;
                    btn.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold font-mono text-zinc-300">${item.sym}</span>
                            <span class="text-[13px]">${item.grade}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="score-bar"><div class="h-full bg-emerald-500" style="width:${Math.min(item.score, 100)}%"></div></div>
                            <span class="text-[10px] text-emerald-500 font-mono font-bold">${Math.round(item.score)}</span>
                        </div>`;
                    btn.onclick = () => switchSymbol(item.sym, item.fullTicker, item.grade);
                    grid.appendChild(btn);
                });
                section.appendChild(grid);
                container.appendChild(section);
            }
            // 預設載入第一個標的
            const firstCat = Object.keys(dataByCat)[0];
            if (firstCat && dataByCat[firstCat][0]) {
                const f = dataByCat[firstCat][0];
                switchSymbol(f.sym, f.fullTicker, f.grade);
            }
        }

        function switchSymbol(sym, fullTicker, grade) {
            currentSymbol = sym;
            document.querySelectorAll('.stock-item').forEach(el => el.classList.toggle('active', el.querySelector('span').innerText === sym));
            document.getElementById('desc-name').innerText = sym;
            document.getElementById('desc-emoji').innerText = grade;
            document.getElementById('desc-content').innerText = LIFE_DESC[sym] || "這是一家在該領域具備核心技術實力的全球標竿企業，正透過其專業影響著未來趨勢。";
            
            document.getElementById('tv-overview-widget').innerHTML = "";
            const s = document.createElement('script'); s.src = "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"; s.async=true;
            s.innerHTML = JSON.stringify({ "symbols": [[`${fullTicker}|1D`]], "chartOnly": false, "width": "100%", "height": "100%", "locale": "zh_TW", "colorTheme": "dark", "gridLineColor": "rgba(42, 46, 57, 0)", "lineColor": "#10b981", "topColor": "rgba(16, 185, 129, 0.15)", "bottomColor": "rgba(16, 185, 129, 0)", "autosize": true });
            document.getElementById('tv-overview-widget').appendChild(s);
            fetchNews(sym);
        }

        async function fetchNews(sym) {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q='+sym+'+stock&hl=zh-TW&gl=TW&ceid=TW:zh-Hant')}`);
            const data = await res.json();
            document.getElementById('news-feed').innerHTML = data.items.slice(0, 3).map(i => `<div class="p-4 border border-zinc-900 rounded bg-zinc-950/50 text-[10px] leading-relaxed transition-all hover:border-emerald-500/30"><div class="text-zinc-600 mb-1">${i.pubDate.split(' ')[0]}</div><a href="${i.link}" target="_blank" class="hover:text-emerald-400 transition-colors">${i.title}</a></div>`).join('');
        }

        async function fetchYoutube() {
            const player = document.getElementById('yt-player-container');
            const list = document.getElementById('yt-list');
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id='+YT_CHANNEL_ID)}`);
            const data = await res.json();
            if(data.status==='ok' && data.items.length > 0) {
                const vidId = data.items[0].link.split('v=')[1];
                player.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe>`;
                list.innerHTML = data.items.slice(1, 7).map(item => `<div class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl hover:border-emerald-500/50 cursor-pointer transition-all" onclick="updatePlayer('${item.link.split('v=')[1]}')"><h4 class="line-clamp-2">${item.title}</h4></div>`).join('');
            }
        }

        function updatePlayer(id) { document.getElementById('yt-player-container').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`; }
        
        function switchPage(p) { 
            document.getElementById('page-stocks').classList.toggle('hidden', p !== 'stocks'); 
            document.getElementById('page-youtube').classList.toggle('hidden', p !== 'youtube');
            document.getElementById('stock-list-container').classList.toggle('hidden', p !== 'stocks');
            document.getElementById('video-info-container').classList.toggle('hidden', p !== 'youtube');
            document.getElementById('tab-stocks').classList.toggle('active', p === 'stocks');
            document.getElementById('tab-youtube').classList.toggle('active', p === 'youtube');
        }

        window.onload = () => {
            const ticker = document.createElement('script'); ticker.src = "https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"; ticker.async = true;
            ticker.innerHTML = JSON.stringify({ "symbols": [{"proName": "NASDAQ:NDX", "title": "Nasdaq 100"}, {"proName": "PHLX:SOX", "title": "費半"}, {"proName": "FX_IDC:USDTWD", "title": "美元/台幣"}], "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "zh_TW" });
            document.getElementById('tv-ticker-widget').appendChild(ticker);
            syncData(); fetchYoutube();
        };
    </script>
</body>
</html>
