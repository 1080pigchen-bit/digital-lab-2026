<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Foosball: Pro Physics 2026</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #050505; color: #d4af37; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .luxury-frame { background: #111; border: 12px solid #8a6d3b; border-radius: 10px; box-shadow: 0 0 80px rgba(212, 175, 55, 0.2); padding: 10px; }
        canvas { background: #080808; display: block; cursor: none; }
        .hud { width: 800px; display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; font-size: 26px; }
    </style>
</head>
<body>
    <div class="hud">
        <span>GOLD <span id="sY">0</span></span>
        <span style="color:#444; font-size:14px">2-3-3 | DECAY: 0.96 | BOWL PHYSICS</span>
        <span><span id="sR">0</span> SILVER</span>
    </div>

    <div class="luxury-frame"><canvas id="game" width="800" height="460"></canvas></div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let ball = { x: 400, y: 230, dx: 3, dy: 3, r: 8 };
        let scores = { y: 0, r: 0 };
        
        // 物理參數微調：增加遞減感與向心力
        const friction = 0.96;   // 遞減明顯化 (每幀保留 96%)
        const k = 0.0002;        // 碗狀場地恢復力
        const centerX = 400, centerY = 230;
        const minSpeed = 0.8;
        const pSpeed = 8;
        const pW = 26;           // 球員變粗
        const pH = 44;           // 基礎高度
        const goalY = [150, 310];

        const rods = [
            { x: 60,  n: 2, team: 'gold',   off: 0, color: '#d4af37', key: 'KeyQ', rot: 0 },
            { x: 190, n: 3, team: 'silver', off: 0, color: '#c0c0c0', key: 'Comma', rot: 0 },
            { x: 320, n: 3, team: 'gold',   off: 0, color: '#d4af37', key: 'KeyA', rot: 0 },
            { x: 480, n: 3, team: 'silver', off: 0, color: '#c0c0c0', key: 'KeyL', rot: 0 },
            { x: 610, n: 3, team: 'gold',   off: 0, color: '#d4af37', key: 'KeyZ', rot: 0 },
            { x: 740, n: 2, team: 'silver', off: 0, color: '#c0c0c0', key: 'KeyO', rot: 0 }
        ];

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function physics() {
            if (keys['KeyW']) rods.filter(r=>r.team==='gold').forEach(r=>r.off = Math.max(-175, r.off-pSpeed));
            if (keys['KeyS']) rods.filter(r=>r.team==='gold').forEach(r=>r.off = Math.min(175, r.off+pSpeed));
            if (keys['KeyI']) rods.filter(r=>r.team==='silver').forEach(r=>r.off = Math.max(-175, r.off-pSpeed));
            if (keys['KeyK']) rods.filter(r=>r.team==='silver').forEach(r=>r.off = Math.min(175, r.off+pSpeed));

            rods.forEach(rod => {
                if (keys[rod.key]) rod.rot = Math.min(1, rod.rot + 0.25);
                else rod.rot = Math.max(0, rod.rot - 0.1);
            });

            // 碗狀物理與強遞減
            ball.dx += (centerX - ball.x) * k;
            ball.dy += (centerY - ball.y) * k;
            ball.dx *= friction;
            ball.dy *= friction;

            let v = Math.sqrt(ball.dx**2 + ball.dy**2);
            if (v < minSpeed) { ball.dx *= (minSpeed/v); ball.dy *= (minSpeed/v); }

            ball.x += ball.dx; ball.y += ball.dy;

            if (ball.y < 0 || ball.y > canvas.height) ball.dy *= -1;
            if (ball.x < 0) {
                if (ball.y > goalY[0] && ball.y < goalY[1]) { scores.r++; reset(); }
                else { ball.dx *= -1; ball.x = 5; }
            } else if (ball.x > canvas.width) {
                if (ball.y > goalY[0] && ball.y < goalY[1]) { scores.y++; reset(); }
                else { ball.dx *= -1; ball.x = canvas.width - 5; }
            }

            rods.forEach(rod => {
                const spacing = canvas.height / (rod.n + 1);
                for (let i = 1; i <= rod.n; i++) {
                    let py = spacing * i + rod.off;
                    // 動態高度判定（考慮長腳）
                    let currentH = pH * (1 + rod.rot * 0.6);
                    if (Math.abs(ball.x - rod.x) < pW/2 + ball.r && Math.abs(ball.y - py) < currentH/2 + ball.r) {
                        let impulse = rod.rot > 0.1 ? 5.0 : 1.1; 
                        ball.dx *= -impulse;
                        ball.x += ball.dx * 2;
                        ball.dy += (ball.y - py) * 0.2;
                    }
                }
            });
            document.getElementById('sY').innerText = scores.y;
            document.getElementById('sR').innerText = scores.r;
        }

        function reset() { ball.x = 400; ball.y = 230; ball.dx = (Math.random()>0.5?4:-4); ball.dy = 1; }

        function draw() {
            ctx.clearRect(0, 0, 800, 460);
            let grad = ctx.createRadialGradient(400, 230, 50, 400, 230, 400);
            grad.addColorStop(0, "#0a0a0a");
            grad.addColorStop(1, "#1a1a1a");
            ctx.fillStyle = grad; ctx.fillRect(0,0,800,460);

            ctx.lineWidth = 4;
            ctx.strokeStyle = "#d4af37"; ctx.strokeRect(0, goalY[0], 8, goalY[1]-goalY[0]);
            ctx.strokeStyle = "#c0c0c0"; ctx.strokeRect(792, goalY[0], 8, goalY[1]-goalY[0]);

            rods.forEach(rod => {
                ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fillRect(rod.x - 1, 0, 2, 460);
                const spacing = canvas.height / (rod.n + 1);
                for (let i = 1; i <= rod.n; i++) {
                    let py = spacing * i + rod.off;
                    // 長腳效果：旋轉時高度增加
                    let currentH = pH * (1 + rod.rot * 0.6);
                    let currentW = pW * (1 - rod.rot * 0.2); // 伸長時稍微變瘦一點點模擬視覺

                    let rGrad = ctx.createLinearGradient(rod.x-currentW/2, 0, rod.x+currentW/2, 0);
                    rGrad.addColorStop(0, '#222'); rGrad.addColorStop(0.5, rod.color); rGrad.addColorStop(1, '#222');
                    
                    if (rod.rot > 0.1) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = rod.color;
                    }
                    ctx.fillStyle = rGrad;
                    ctx.fillRect(rod.x - currentW/2, py - currentH/2, currentW, currentH);
                    ctx.shadowBlur = 0;
                }
            });

            ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function main() { physics(); draw(); requestAnimationFrame(main); }
        main();
    </script>
</body>
</html>
